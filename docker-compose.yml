networks:
  backend:
    driver: bridge
services:
  backend-db:
    image: postgres:latest
    container_name: coop-db
    environment:
      PGDATA: /tmp
      POSTGRES_DB: coop
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${DB_DEFAULT_PASSWORD}
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - "./docker/data/db-backend:/var/lib/postgresql/data"
    networks:
      - backend